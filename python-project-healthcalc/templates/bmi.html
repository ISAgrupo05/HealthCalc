<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="metric-page">

    <h1>BMI</h1>
    <p>Introduce your values:</p>
    
    <form action="{{ url_for('bmi') }}" method="POST">
        <div class="form-row"> 
             <label for="height">Height (m)</label>
             <input type="number" id="height" name="height" step="0.01" 
                    value="{{ height if height != None else '' }}" required>
        </div>
        <div class="form-row-weight">
             <label for="weight">Weight (kg)</label>
             <input type="number" id="weight" name="weight" step="0.1" 
                    value="{{ weight if weight != None else '' }}" required>
        </div>

        {% if resultado != None and classification != None %}
        
        <div class="result-box">
            {%if resultado is string and "Error" in resultado %}
                <p class="error-message">{{ resultado }}</p>
            {% else %}
                <h2>Results</h2>

                <p> Your BMI is: {{ resultado }}</p>
                <p> Your BMI Classification is: {{ classification }}</p>
                
                {% endif %}
        </div>

        {%endif %}
        <div class="calculator-section">
                    <img src="{{ url_for('static', filename='img/CalculadoraMetricas.png') }}"
                        alt="Health calculator character"
                        class="calculator-img2">
                    <button type="submit">Calculate</button> 
        </div>

    </form>  
    
    <div class="exit">  
            <form action="{{ url_for('home') }}" method="GET">
                <button class="button-home" title="Click here to go back to the Home page.">
                    <img src="{{ url_for('static', filename='img/HomeIcon.png') }}" alt="Inicio" width="85e">
                </button>
            </form>    
    </div>

</body>
</html>
