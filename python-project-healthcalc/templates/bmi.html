<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <h1>BMI</h1>
    <p>Introduce your values:</p>
    
    <form action="{{ url_for('bmi') }}" method="POST">
        <div class="form-row"> 
             <label for="height">Height (m)</label>
             <input type="number" id="height" name="height" step="0.01" 
                    value="{{ height if height != None else '' }}" required>
        </div>
        <div class="form-row">
             <label for="weight">Weight (kg)</label>
             <input type="number" id="weight" name="weight" step="0.1" 
                    value="{{ weight if weight != None else '' }}" required>
        </div>

        <h2>Results</h2>

        <p> Your BMI is: {{ resultado }}</p>
        <p> Your BMI Classification is: {{ classification }}</p>
        <div class="calculator-section">
            <img src="{{ url_for('static', filename='img/CalculadoraMetricas.png') }}"
                alt="Health calculator character"
                class="calculator-img">
            <button type="submit">Calculate</button> 
        </div>
        


    </form>   

</body>
</html>
