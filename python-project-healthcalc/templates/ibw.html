<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBW</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class = "ibw-page">

    <h1>IBW</h1>
    <p>Introduce your values:</p>
    
    <form action="{{ url_for('ibw') }}" method="POST">
        <div class="form-row"> 
             <label for="height">Height (m)</label>
             <input type="number" id="height" name="height" step="0.01" 
                    value="{{ height if height != None else '' }}" required>
        </div>
        <div class="form-row">
            <label>Sex:</label>
            <label>
                <input type="radio" name="gender" value="M">
                Male
            </label>
        </div>
        <div class="form-row">
            <label>
                <input type="radio" name="gender" value="F">
                Female
            </label>
        </div>

        {% if resultado != None %}
        <div class="result-box">

            {%if resultado is string and "Error" in resultado %}
                <p class="error-message">{{ resultado }}</p>
            {% else %}
                <h2>Results</h2>

                <p> Your IBW is: {{ resultado }}</p>
                
                {% endif %}
        </div>
        
        {% endif %}

        <div class="calculator-section">
            <img src="{{ url_for('static', filename='img/CalculadoraMetricas.png') }}"
                alt="Health calculator character"
                class="calculator-img">
            <button type="submit">Calculate</button> 
        </div>
        


    </form>   

</body>
</html>
